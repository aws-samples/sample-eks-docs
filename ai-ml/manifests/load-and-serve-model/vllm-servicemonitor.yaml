# Tells the kube-prometheus-stack Prometheus where to scrape vLLM metrics.
# The release: kube-prometheus-stack label is what the operator's serviceMonitorSelector matches.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vllm-inference-app
  namespace: default
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: vllm-inference-app
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
